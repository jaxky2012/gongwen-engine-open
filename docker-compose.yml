version: '3.8'

services:
  gongwen-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: gongwen-engine:v14
    container_name: gongwen-api
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

# 数据卷说明：
# ./output - 生成的公文文件存储目录
